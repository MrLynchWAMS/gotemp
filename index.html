<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple GoTemp</title>
    <!-- Load Vernier's official Go Direct library -->
    <script src="https://unpkg.com/@vernier/godirect/dist/godirect.min.js"></script>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --success: #22c55e;
            --success-hover: #16a34a;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .data-display {
            font-size: 6rem;
            font-weight: 800;
            margin: 10px 0 0 0;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }

        select {
            font-size: 1.25rem;
            padding: 10px 16px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background-color: var(--bg);
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 30px;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        hr {
            border: 0;
            border-top: 2px dashed #e2e8f0;
            margin: 30px 0;
        }

        .stopwatch-display {
            font-size: 4rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .controls-row {
            display: flex;
            gap: 15px;
        }

        .stopwatch-btn {
            background-color: var(--success);
            margin-bottom: 0;
        }

        .stopwatch-btn:hover { background-color: var(--success-hover); }

        .stopwatch-btn.running {
            background-color: #f59e0b; /* Amber for pause/stop */
        }
        .stopwatch-btn.running:hover { background-color: #d97706; }

        .reset-btn {
            background-color: var(--danger);
            margin-bottom: 0;
        }

        .reset-btn:hover { background-color: var(--danger-hover); }

        .status-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: -10px;
            margin-bottom: 20px;
            display: block;
        }

    </style>
</head>
<body>

    <div class="card">
        <button id="connectBtn">Connect Sensor</button>
        <span class="status-text" id="statusText">Requires Chrome or Edge</span>
        
        <div class="data-display" id="tempDisplay">--.-</div>
        
        <select id="unitSelect">
            <option value="C">°C</option>
            <option value="F">°F</option>
            <option value="K">K</option>
        </select>

        <hr>

        <div class="stopwatch-display" id="timeDisplay">00:00.0</div>
        <div class="controls-row">
            <button class="stopwatch-btn" id="startStopBtn">Start</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        // --- Sensor Logic ---
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('statusText');
        const tempDisplay = document.getElementById('tempDisplay');
        const unitSelect = document.getElementById('unitSelect');
        let currentCelsius = null;

        connectBtn.addEventListener('click', async () => {
            try {
                // Update UI to show we are trying to connect
                connectBtn.innerText = "Searching...";
                statusText.innerText = "Select your device in the popup window";

                // Prompts the user to select their Vernier device
                const device = await godirect.selectDevice();
                
                // Get the default temperature sensor (usually channel 1)
                const sensor = device.getSensor(1); 
                
                sensor.on('value-changed', (sensor) => {
                    currentCelsius = sensor.value;
                    updateTemperatureDisplay();
                });

                // Start reading data
                device.start();
                
                // Update UI on success
                connectBtn.innerText = "Connected";
                connectBtn.style.backgroundColor = "var(--success)";
                connectBtn.disabled = true;
                statusText.innerText = "Receiving data...";

            } catch (error) {
                console.error(error);
                connectBtn.innerText = "Connect Sensor";
                statusText.innerText = "Ready to connect";
                
                // Provide a specific error message based on common issues
                let errorMessage = error.message;
                if (window.location.protocol === 'file:') {
                    errorMessage = "Hardware connections are blocked for local files. You must host this file online (e.g., GitHub Pages) for it to work.";
                }
                alert(`Connection failed.\n\nError: ${errorMessage}`);
            }
        });

        unitSelect.addEventListener('change', updateTemperatureDisplay);

        function updateTemperatureDisplay() {
            if (currentCelsius === null) return;
            
            let displayTemp = currentCelsius;
            const unit = unitSelect.value;

            if (unit === 'F') {
                displayTemp = (currentCelsius * 9/5) + 32;
            } else if (unit === 'K') {
                displayTemp = currentCelsius + 273.15;
            }

            tempDisplay.innerText = displayTemp.toFixed(1);
        }

        // --- Stopwatch Logic ---
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        
        const timeDisplay = document.getElementById('timeDisplay');
        const startStopBtn = document.getElementById('startStopBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateTime() {
            const time = Date.now() - startTime + elapsedTime;
            const minutes = Math.floor(time / 60000);
            const seconds = Math.floor((time % 60000) / 1000);
            const tenths = Math.floor((time % 1000) / 100);
            
            timeDisplay.innerText = 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0') + '.' + tenths;
        }

        startStopBtn.addEventListener('click', () => {
            if (isRunning) {
                // Pause
                clearInterval(timerInterval);
                elapsedTime += Date.now() - startTime;
                startStopBtn.innerText = "Start";
                startStopBtn.classList.remove('running');
            } else {
                // Start
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 100);
                startStopBtn.innerText = "Pause";
                startStopBtn.classList.add('running');
            }
            isRunning = !isRunning;
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            timeDisplay.innerText = "00:00.0";
            startStopBtn.innerText = "Start";
            startStopBtn.classList.remove('running');
        });
    </script>
</body>
</html>
