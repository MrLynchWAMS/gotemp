<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple GoTemp (v2.0 - USB WebHID)</title>
    <!-- Note: Vernier GoDirect library removed. Using Custom WebHID for legacy hardware -->
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --success: #22c55e;
            --success-hover: #16a34a;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .data-display {
            font-size: 6rem;
            font-weight: 800;
            margin: 10px 0 0 0;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }

        select {
            font-size: 1.25rem;
            padding: 10px 16px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background-color: var(--bg);
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 30px;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        hr {
            border: 0;
            border-top: 2px dashed #e2e8f0;
            margin: 30px 0;
        }

        .stopwatch-display {
            font-size: 4rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .controls-row {
            display: flex;
            gap: 15px;
        }

        .stopwatch-btn {
            background-color: var(--success);
            margin-bottom: 0;
        }

        .stopwatch-btn:hover { background-color: var(--success-hover); }

        .stopwatch-btn.running {
            background-color: #f59e0b;
        }
        .stopwatch-btn.running:hover { background-color: #d97706; }

        .reset-btn {
            background-color: var(--danger);
            margin-bottom: 0;
        }

        .reset-btn:hover { background-color: var(--danger-hover); }

        .status-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: block;
            word-wrap: break-word;
            padding: 0 10px;
        }

        .debug-terminal {
            background: #1e293b;
            color: #38bdf8;
            font-family: ui-monospace, monospace;
            font-size: 0.8rem;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

    </style>
</head>
<body>

    <div class="card">
        <button id="connectBtn">Connect USB Sensor</button>
        <span class="status-text" id="statusText">Plug in the legacy Go!Temp via USB.</span>
        
        <div class="data-display" id="tempDisplay">--.-</div>
        
        <select id="unitSelect">
            <option value="C">°C</option>
            <option value="F">°F</option>
            <option value="K">K</option>
        </select>

        <hr>

        <div class="stopwatch-display" id="timeDisplay">00:00.0</div>
        <div class="controls-row">
            <button class="stopwatch-btn" id="startStopBtn">Start</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <!-- Terminal to see the raw USB data -->
        <div class="debug-terminal" id="debugBox">
            > Waiting for USB WebHID connection...
        </div>
    </div>

    <script>
        // --- Custom USB WebHID Logic for Legacy Go!Temp ---
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('statusText');
        const tempDisplay = document.getElementById('tempDisplay');
        const unitSelect = document.getElementById('unitSelect');
        const debugBox = document.getElementById('debugBox');
        
        const VERNIER_VENDOR_ID = 0x08F7; // Official Vernier USB ID
        let usbDevice = null;
        let currentCelsius = null;

        connectBtn.addEventListener('click', async () => {
            // Check if browser supports WebHID
            if (!navigator.hid) {
                statusText.style.color = "var(--danger)";
                statusText.innerText = "Error: WebHID is not supported in this browser. You must use Chrome/Edge on a desktop/Chromebook.";
                return;
            }

            try {
                connectBtn.innerText = "Requesting USB...";
                connectBtn.disabled = true;

                // Open the Chrome popup looking specifically for Vernier devices
                const devices = await navigator.hid.requestDevice({
                    filters: [{ vendorId: VERNIER_VENDOR_ID }]
                });

                if (devices.length === 0) {
                    throw new Error("No device selected in the popup.");
                }

                usbDevice = devices[0];
                await usbDevice.open();

                connectBtn.innerText = "Connected";
                connectBtn.style.backgroundColor = "var(--success)";
                statusText.innerText = `Receiving raw data from ${usbDevice.productName}...`;

                // Listen for data packets flying in from the USB port!
                usbDevice.addEventListener("inputreport", (event) => {
                    const { data } = event;
                    
                    // 1. Debugging: Print the raw bytes to the screen
                    const bytes = [];
                    for (let i = 0; i < data.byteLength; i++) {
                        bytes.push(data.getUint8(i).toString(16).padStart(2, '0'));
                    }
                    debugBox.innerText = `> RAW PACKET: [ ${bytes.join(' ')} ]`;

                    // 2. Decode the Data
                    // Go!Temp sends an 8-byte packet. 
                    // Usually, Bytes 2 & 3 hold a 16-bit integer representing the measurement.
                    if (data.byteLength >= 4) {
                        // Read a 16-bit integer from byte index 2 (Little Endian format)
                        const rawMeasurement = data.getInt16(2, true); 
                        
                        // NOTE: Without Vernier's proprietary EEPROM calibration curve, we have to 
                        // approximate the conversion. We are guessing the multiplier here.
                        // If the temperature is completely wrong, we will adjust this math later!
                        const approximateCelsius = rawMeasurement / 128.0; 
                        
                        currentCelsius = approximateCelsius;
                        updateTemperatureDisplay();
                    }
                });

                // Send a generic "Start Measurements" command (Command 0x18 is common for Vernier)
                try {
                    await usbDevice.sendReport(0, new Uint8Array([0x18]));
                } catch(e) {
                    console.log("Initialization command failed, device might auto-stream.");
                }

            } catch (error) {
                console.error(error);
                connectBtn.innerText = "Connect USB Sensor";
                connectBtn.disabled = false;
                statusText.style.color = "var(--danger)";
                statusText.innerText = `Error: ${error.message}`;
            }
        });

        unitSelect.addEventListener('change', updateTemperatureDisplay);

        function updateTemperatureDisplay() {
            if (currentCelsius === null) return;
            
            let displayTemp = currentCelsius;
            const unit = unitSelect.value;

            if (unit === 'F') {
                displayTemp = (currentCelsius * 9/5) + 32;
            } else if (unit === 'K') {
                displayTemp = currentCelsius + 273.15;
            }

            tempDisplay.innerText = displayTemp.toFixed(1);
        }

        // --- Stopwatch Logic ---
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        
        const timeDisplay = document.getElementById('timeDisplay');
        const startStopBtn = document.getElementById('startStopBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateTime() {
            const time = Date.now() - startTime + elapsedTime;
            const minutes = Math.floor(time / 60000);
            const seconds = Math.floor((time % 60000) / 1000);
            const tenths = Math.floor((time % 1000) / 100);
            
            timeDisplay.innerText = 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0') + '.' + tenths;
        }

        startStopBtn.addEventListener('click', () => {
            if (isRunning) {
                // Pause
                clearInterval(timerInterval);
                elapsedTime += Date.now() - startTime;
                startStopBtn.innerText = "Start";
                startStopBtn.classList.remove('running');
            } else {
                // Start
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 100);
                startStopBtn.innerText = "Pause";
                startStopBtn.classList.add('running');
            }
            isRunning = !isRunning;
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            timeDisplay.innerText = "00:00.0";
            startStopBtn.innerText = "Start";
            startStopBtn.classList.remove('running');
        });
    </script>
</body>
</html>
