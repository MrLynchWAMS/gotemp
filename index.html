<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple GoTemp</title>
    <script src="https://unpkg.com/@vernier/godirect/dist/godirect.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .stopwatch-btn { background-color: #28a745; }
        .stopwatch-btn:hover { background-color: #1e7e34; }
        .reset-btn { background-color: #dc3545; }
        .reset-btn:hover { background-color: #c82333; }
        
        .data-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #222;
        }
        .stopwatch-display {
            font-size: 3rem;
            font-family: monospace;
            color: #555;
            margin-bottom: 20px;
        }
        select {
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <button id="connectBtn">Connect Sensor</button>
        
        <div class="data-display" id="tempDisplay">--.-</div>
        
        <select id="unitSelect">
            <option value="C">Celsius (°C)</option>
            <option value="F">Fahrenheit (°F)</option>
            <option value="K">Kelvin (K)</option>
        </select>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

        <div class="stopwatch-display" id="timeDisplay">00:00.0</div>
        <div class="row">
            <button class="stopwatch-btn" id="startStopBtn">Start Time</button>
            <button class="reset-btn" id="resetBtn">Reset Time</button>
        </div>
    </div>

    <script>
        // --- Sensor Logic ---
        const connectBtn = document.getElementById('connectBtn');
        const tempDisplay = document.getElementById('tempDisplay');
        const unitSelect = document.getElementById('unitSelect');
        let currentCelsius = null;

        connectBtn.addEventListener('click', async () => {
            try {
                // Prompts the user to select their Vernier device
                const device = await godirect.selectDevice();
                
                // Get the default temperature sensor (usually channel 1)
                const sensor = device.getSensor(1); 
                
                sensor.on('value-changed', (sensor) => {
                    currentCelsius = sensor.value;
                    updateTemperatureDisplay();
                });

                device.start();
                connectBtn.innerText = "Connected";
                connectBtn.disabled = true;
            } catch (error) {
                console.error(error);
                alert("Connection failed. Ensure the sensor is on, and you are using Chrome or Edge.");
            }
        });

        unitSelect.addEventListener('change', updateTemperatureDisplay);

        function updateTemperatureDisplay() {
            if (currentCelsius === null) return;
            
            let displayTemp = currentCelsius;
            const unit = unitSelect.value;

            if (unit === 'F') {
                displayTemp = (currentCelsius * 9/5) + 32;
            } else if (unit === 'K') {
                displayTemp = currentCelsius + 273.15;
            }

            tempDisplay.innerText = displayTemp.toFixed(1) + (unit === 'K' ? ' K' : ' °' + unit);
        }

        // --- Stopwatch Logic ---
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        
        const timeDisplay = document.getElementById('timeDisplay');
        const startStopBtn = document.getElementById('startStopBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateTime() {
            const time = Date.now() - startTime + elapsedTime;
            const minutes = Math.floor(time / 60000);
            const seconds = Math.floor((time % 60000) / 1000);
            const tenths = Math.floor((time % 1000) / 100);
            
            timeDisplay.innerText = 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0') + '.' + tenths;
        }

        startStopBtn.addEventListener('click', () => {
            if (isRunning) {
                clearInterval(timerInterval);
                elapsedTime += Date.now() - startTime;
                startStopBtn.innerText = "Resume Time";
                startStopBtn.style.backgroundColor = "#007bff";
            } else {
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 100);
                startStopBtn.innerText = "Stop Time";
                startStopBtn.style.backgroundColor = "#dc3545"; // Red for stop
            }
            isRunning = !isRunning;
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            timeDisplay.innerText = "00:00.0";
            startStopBtn.innerText = "Start Time";
            startStopBtn.style.backgroundColor = "#28a745"; // Green for start
        });
    </script>
</body>
</html>
