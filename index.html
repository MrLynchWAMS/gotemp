<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go!Temp Temperature Probe</title>
    <!-- Note: Vernier GoDirect library removed. Using Custom WebHID for legacy hardware -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='10' y='2' width='4' height='14' rx='2' fill='%23e2e8f0' stroke='%2394a3b8' stroke-width='1'/%3E%3Ccircle cx='12' cy='18' r='4' fill='%23ef4444'/%3E%3Crect x='10.5' y='8' width='3' height='9.5' rx='1.5' fill='%23ef4444'/%3E%3Cline x1='14' y1='5' x2='16' y2='5' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='14' y1='8' x2='16' y2='8' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='14' y1='11' x2='16' y2='11' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --success: #22c55e;
            --success-hover: #16a34a;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.5), 0 4px 15px rgba(14, 165, 233, 0.3); transform: scale(1); }
            50%       { box-shadow: 0 0 0 10px rgba(14, 165, 233, 0), 0 4px 25px rgba(14, 165, 233, 0.5); transform: scale(1.02); }
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 20px 36px;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            animation: none;
        }

        #connectBtn.idle {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .data-display {
            font-size: 6rem;
            font-weight: 800;
            margin: 10px 0 0 0;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }

        select {
            font-size: 1.25rem;
            padding: 10px 16px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background-color: var(--bg);
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 30px;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        hr {
            border: 0;
            border-top: 2px dashed #e2e8f0;
            margin: 30px 0;
        }

        .stopwatch-display {
            font-size: 4rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .controls-row {
            display: flex;
            gap: 15px;
        }

        .stopwatch-btn {
            background-color: var(--success);
            margin-bottom: 0;
        }

        .stopwatch-btn:hover { background-color: var(--success-hover); }

        .stopwatch-btn.running {
            background-color: #f59e0b;
        }
        .stopwatch-btn.running:hover { background-color: #d97706; }

        .reset-btn {
            background-color: var(--danger);
            margin-bottom: 0;
        }

        .reset-btn:hover { background-color: var(--danger-hover); }

        .status-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: block;
            word-wrap: break-word;
            padding: 0 10px;
        }

        /* --- Connect Instruction Overlay --- */
        .connect-overlay-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .connect-overlay-backdrop.visible {
            display: flex;
        }

        .connect-overlay-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 36px 32px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .connect-overlay-card h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 14px;
            color: var(--text-main);
        }

        .connect-overlay-card p {
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0 0 24px;
        }

        .connect-overlay-card .got-it-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 18px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .connect-overlay-card .got-it-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .connect-overlay-card .got-it-btn:active {
            transform: translateY(1px);
        }

        .connect-overlay-card .dont-show-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .connect-overlay-card .dont-show-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* --- Stale data warning --- */
        .data-display.stale {
            animation: stale-blink 1s ease-in-out infinite;
            color: var(--danger);
        }

        @keyframes stale-blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.3; }
        }

    </style>
</head>
<body>

    <!-- Connect Instruction Overlay -->
    <div class="connect-overlay-backdrop" id="connectOverlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
        <div class="connect-overlay-card">
            <h2 id="overlayTitle">📋 Before the popup opens…</h2>
            <p>
                A <strong>browser popup will appear next</strong>.<br>
                Select your <strong>Go!Temp</strong> from the device list,
                then click <strong>Connect</strong>.
            </p>
            <button class="got-it-btn" id="gotItBtn">👍 Got it — Show the device list</button>
            <label class="dont-show-label">
                <input type="checkbox" id="dontShowAgain">
                Don't show this again
            </label>
        </div>
    </div>

    <div class="card">
        <button id="connectBtn" class="idle">🔌 Connect Temperature Probe</button>
        <span class="status-text" id="statusText">Step 1: Plug in your Go!Temp, then click the button above.</span>
        
        <div class="data-display" id="tempDisplay">--.-</div>
        
        <select id="unitSelect">
            <option value="C">°C</option>
            <option value="F">°F</option>
            <option value="K">K</option>
        </select>

        <hr>

        <div class="stopwatch-display" id="timeDisplay">00:00.0</div>
        <div class="controls-row">
            <button class="stopwatch-btn" id="startStopBtn">Start</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        // --- Custom USB WebHID Logic for Legacy Go!Temp ---
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('statusText');
        const tempDisplay = document.getElementById('tempDisplay');
        const unitSelect = document.getElementById('unitSelect');
        const connectOverlay = document.getElementById('connectOverlay');
        const gotItBtn = document.getElementById('gotItBtn');
        const dontShowAgain = document.getElementById('dontShowAgain');
        
        const VERNIER_VENDOR_ID = 0x08F7; // Official Vernier USB ID
        const DONT_SHOW_KEY = 'gotemp_skip_connect_hint';

        let usbDevice = null;
        let currentCelsius = null;
        let lastDataTimestamp = 0;
        let staleCheckInterval = null;

        function clearStaleInterval() {
            if (staleCheckInterval !== null) {
                clearInterval(staleCheckInterval);
                staleCheckInterval = null;
            }
        }

        function setLiveStatus() {
            statusText.style.color = "";
            statusText.innerText = `Receiving data from ${usbDevice.productName}…`;
        }

        function onConnected(device) {
            usbDevice = device;
            connectBtn.innerText = "Connected ✅";
            connectBtn.classList.remove('idle');
            connectBtn.style.backgroundColor = "var(--success)";
            connectBtn.disabled = true;
            setLiveStatus();

            lastDataTimestamp = Date.now();

            usbDevice.addEventListener("inputreport", (event) => {
                const { data } = event;

                // Debug: log raw bytes to DevTools console (not student-facing)
                const bytes = [];
                for (let i = 0; i < data.byteLength; i++) {
                    bytes.push(data.getUint8(i).toString(16).padStart(2, '0'));
                }
                console.log(`RAW PACKET: [ ${bytes.join(' ')} ]`);

                // Decode the Data
                // Go!Temp sends an 8-byte packet.
                // Bytes 2 & 3 hold a 16-bit integer representing the measurement.
                if (data.byteLength >= 4) {
                    const rawMeasurement = data.getInt16(2, true);
                    const approximateCelsius = rawMeasurement / 128.0;
                    currentCelsius = approximateCelsius;

                    // Fresh data received — clear any stale warning
                    lastDataTimestamp = Date.now();
                    if (tempDisplay.classList.contains('stale')) {
                        tempDisplay.classList.remove('stale');
                        setLiveStatus();
                    }

                    updateTemperatureDisplay();
                }
            });

            // Detect device disconnect (WebHID fires this on navigator.hid) to clean up the stale checker
            navigator.hid.addEventListener("disconnect", (event) => {
                if (event.device === usbDevice) {
                    clearStaleInterval();
                    currentCelsius = null;
                    tempDisplay.innerText = "--.-";
                    tempDisplay.classList.remove('stale');
                    connectBtn.innerText = "🔌 Connect Temperature Probe";
                    connectBtn.disabled = false;
                    connectBtn.classList.add('idle');
                    connectBtn.style.backgroundColor = "";
                    statusText.style.color = "var(--danger)";
                    statusText.innerText = "⚠️ Sensor disconnected — plug it back in and reconnect.";
                    usbDevice = null;
                }
            });

            // Start staleness checker — warns if no data arrives for 2+ seconds
            clearStaleInterval();
            staleCheckInterval = setInterval(() => {
                if (lastDataTimestamp !== 0 && (Date.now() - lastDataTimestamp > 2000)) {
                    tempDisplay.classList.add('stale');
                    tempDisplay.innerText = "--.-";
                    currentCelsius = null;
                    statusText.style.color = "var(--danger)";
                    statusText.innerText = "⚠️ No new data received — probe may be disconnected!";
                }
            }, 1000);

            // Send a generic "Start Measurements" command (Command 0x18 is common for Vernier)
            usbDevice.sendReport(0, new Uint8Array([0x18])).catch(() => {
                console.log("Initialization command failed, device might auto-stream.");
            });
        }

        // --- Auto-reconnect: silently reconnect if permission was previously granted ---
        async function tryAutoConnect() {
            if (!navigator.hid) return;
            try {
                const devices = await navigator.hid.getDevices();
                const vernierDevice = devices.find(d => d.vendorId === VERNIER_VENDOR_ID);
                if (vernierDevice) {
                    connectBtn.innerText = "Reconnecting…";
                    connectBtn.disabled = true;
                    connectBtn.classList.remove('idle');
                    await vernierDevice.open();
                    onConnected(vernierDevice);
                }
            } catch (e) {
                console.log("Auto-reconnect failed:", e);
                connectBtn.innerText = "🔌 Connect Temperature Probe";
                connectBtn.disabled = false;
                connectBtn.classList.add('idle');
            }
        }
        tryAutoConnect();

        // --- Two-step connect flow ---
        async function doRequestDevice() {
            try {
                connectBtn.innerText = "Requesting USB…";
                connectBtn.disabled = true;
                connectBtn.classList.remove('idle');

                // Open the Chrome popup looking specifically for Vernier devices
                const devices = await navigator.hid.requestDevice({
                    filters: [{ vendorId: VERNIER_VENDOR_ID }]
                });

                if (devices.length === 0) {
                    throw new Error("No device selected in the popup.");
                }

                await devices[0].open();
                onConnected(devices[0]);

            } catch (error) {
                console.error(error);
                clearStaleInterval();
                connectBtn.innerText = "🔌 Connect Temperature Probe";
                connectBtn.disabled = false;
                connectBtn.classList.add('idle');
                statusText.style.color = "var(--danger)";
                statusText.innerText = `Error: ${error.message}`;
            }
        }

        connectBtn.addEventListener('click', () => {
            // Check if browser supports WebHID
            if (!navigator.hid) {
                statusText.style.color = "var(--danger)";
                statusText.innerText = "Error: WebHID is not supported in this browser. You must use Chrome/Edge on a desktop/Chromebook.";
                return;
            }

            // If the student previously checked "Don't show this again", skip the overlay
            if (localStorage.getItem(DONT_SHOW_KEY) === 'true') {
                doRequestDevice();
                return;
            }

            // Show the instruction overlay first
            connectOverlay.classList.add('visible');
        });

        gotItBtn.addEventListener('click', () => {
            // Save preference if checkbox is checked
            if (dontShowAgain.checked) {
                localStorage.setItem(DONT_SHOW_KEY, 'true');
            }
            connectOverlay.classList.remove('visible');
            doRequestDevice();
        });

        unitSelect.addEventListener('change', updateTemperatureDisplay);

        function updateTemperatureDisplay() {
            if (currentCelsius === null) return;
            
            let displayTemp = currentCelsius;
            const unit = unitSelect.value;

            if (unit === 'F') {
                displayTemp = (currentCelsius * 9/5) + 32;
            } else if (unit === 'K') {
                displayTemp = currentCelsius + 273.15;
            }

            tempDisplay.innerText = displayTemp.toFixed(1);
        }

        // --- Stopwatch Logic ---
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        
        const timeDisplay = document.getElementById('timeDisplay');
        const startStopBtn = document.getElementById('startStopBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateTime() {
            const time = Date.now() - startTime + elapsedTime;
            const minutes = Math.floor(time / 60000);
            const seconds = Math.floor((time % 60000) / 1000);
            const tenths = Math.floor((time % 1000) / 100);
            
            timeDisplay.innerText = 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0') + '.' + tenths;
        }

        startStopBtn.addEventListener('click', () => {
            if (isRunning) {
                // Pause
                clearInterval(timerInterval);
                elapsedTime += Date.now() - startTime;
                startStopBtn.innerText = "Start";
                startStopBtn.classList.remove('running');
            } else {
                // Start
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 100);
                startStopBtn.innerText = "Pause";
                startStopBtn.classList.add('running');
            }
            isRunning = !isRunning;
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            timeDisplay.innerText = "00:00.0";
            startStopBtn.innerText = "Start";
            startStopBtn.classList.remove('running');
        });
    </script>
</body>
</html>
